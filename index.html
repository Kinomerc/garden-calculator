<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진의 신비한 정원 계산기</title>
    <style>
      :root {
        --primary: #3498db;
        --success: #2ecc71;
        --warning: #f1c40f;
        --danger: #e74c3c;
        --accent: #9b59b6;
        --special: #2c3e50;
      }

      body {
        font-family: 'Pretendard', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #f0f2f5;
        margin: 0;
        padding: 20px;
      }

      .board-container {
        position: relative;
        width: 1001px;
        height: 726px;
        background-size: 100% 100%;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }

      .tile {
        position: absolute;
        width: 7.5%;
        height: 7.5%;
        cursor: pointer;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        box-sizing: border-box;
        transition: 0.2s;
        background-color: rgba(255, 255, 255, 0.05);
      }

      .tile:hover {
        background-color: rgba(255, 0, 0, 0.2);
        border: 2px solid white;
        z-index: 20;
        transform: scale(1.03);
      }

      .tile-id {
        position: absolute;
        top: 1px;
        left: 3px;
        font-size: 0.65rem;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.7);
        pointer-events: none;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
      }

      .tile-reward {
        position: absolute;
        bottom: 0;
        right: 2px;
        font-size: 0.65rem;
        font-weight: bold;
        color: rgba(0, 0, 0, 0.8);
        background: rgba(255, 255, 255, 0.6);
        padding: 0px 2px;
        border-radius: 2px;
        pointer-events: none;
      }

      .buff-2 { background-color: rgba(52, 152, 219, 0.5) !important; border: 2.5px solid var(--primary) !important; }
      .buff-05 { background-color: rgba(231, 76, 60, 0.5) !important; border: 2.5px solid var(--danger) !important; }
      .buff-3 { background-color: rgba(46, 204, 113, 0.5) !important; border: 2.5px solid var(--success) !important; }

      .tile::after {
        position: absolute;
        top: 48%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 1rem;
        font-weight: 900;
        color: white;
        text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.9);
        opacity: 0;
        pointer-events: none;
      }

      .buff-2::after { content: '×2'; opacity: 1; }
      .buff-05::after { content: '÷2'; opacity: 1; }
      .buff-3::after { content: '×3'; opacity: 1; }

      .jin-icon {
        display: inline-block;
        width: 24px;
        height: 38px;
        background-image: url('https://mblogthumb-phinf.pstatic.net/MjAyNjAzMTVfMTIw/MDAxNzczNTQ4Nzg4OTE4.m2TlurnJGhA6b4xQ8AaBcWRqnjtoiW8T_V56VrlbPE4g.nuCktDPzcTeBKrEIVB0wl3iCT7QyW7_VvijWBQ_lvz8g.GIF/0431.img.stand.gif?type=w966');
        background-size: cover;
        background-position: center;
        vertical-align: middle;
        margin-right: 5px;
      }

      .is-start {
        background-color: transparent !important;
        background-image: url('https://mblogthumb-phinf.pstatic.net/MjAyNjAzMTVfMTIw/MDAxNzczNTQ4Nzg4OTE4.m2TlurnJGhA6b4xQ8AaBcWRqnjtoiW8T_V56VrlbPE4g.nuCktDPzcTeBKrEIVB0wl3iCT7QyW7_VvijWBQ_lvz8g.GIF/0431.img.stand.gif?type=w966');
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        z-index: 100;
      }

      .is-start::before {
        content: '🚩';
        position: absolute;
        top: 20px;
        left: 80%;
        transform: translateX(-50%);
        font-size: 1.3rem;
        color: #e74c3c;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        pointer-events: none;
      }

      .center-control {
        position: absolute;
        top: 18%;
        left: 15%;
        width: 70%;
        height: 62%;
        background-color: rgba(255, 255, 255, 0.98);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        padding: 15px;
        box-sizing: border-box;
        z-index: 10;
        border: 1px solid #ddd;
      }

      .top-row {
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: #f8f9fa;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #e9ecef;
        margin-bottom: 10px;
      }

      .sub-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
      }

      .dice-area input {
        width: 45px;
        padding: 8px;
        border: 1px solid #ced4da;
        border-radius: 5px;
        text-align: center;
        font-weight: bold;
        font-size: 1.1em;
      }

      #btn-set-start {
        background: #ff9f43;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
      }

      .edit-btn {
        background: #9b59b6;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        font-size: 0.85em;
      }

      #btn-edit-special { background: var(--special); }

      .active-mode {
        background: #e74c3c !important;
        animation: blinking 1s infinite;
      }

      @keyframes blinking {
        0% { opacity: 1; }
        50% { opacity: 0.7; }
        100% { opacity: 1; }
      }

      .calc-btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 8px 25px;
        border-radius: 6px;
        font-weight: bold;
        font-size: 1em;
        cursor: pointer;
      }

      .q-option select {
        padding: 7px;
        border-radius: 5px;
        border: 1px solid #ddd;
        font-size: 0.9em;
      }

      #result { flex: 1; overflow-y: auto; border-top: 1px solid #eee; padding-top: 10px; }
      .best-card { background: #e8f5e9; border: 2px solid var(--success); padding: 12px; border-radius: 8px; margin-bottom: 8px; }
      .route-item { background: #f8f9fa; border: 1px solid #eee; padding: 8px; border-radius: 6px; margin-bottom: 5px; }
      .highlight-tile { border: 2px solid var(--accent) !important; z-index: 25 !important; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="board-container">
    <div id="tile-overlays"></div>

    <div class="center-control">
        <div class="top-row">
            <div class="sub-row">
                <div style="display:flex; align-items:center; gap:10px;">
                    <label style="font-weight:bold;">🎲 주사위</label>
                    <div class="dice-area">
                        <input type="number" id="d1" min="-18" max="18" value="1">
                        <input type="number" id="d2" min="-18" max="18" value="1">
                        <input type="number" id="d3" min="-18" max="18" value="1">
                    </div>
                </div>
                <div class="q-option">
                    <label style="font-weight:bold; font-size:0.9em; margin-right:5px;">❓ 설정:</label>
                    <select id="q-mode">
                        <option value="200">노란도시락(+200)</option>
                        <option value="232.5">빨간도시락(+232.5)</option>
                    </select>
                </div>
            </div>

            <div class="sub-row">
                <div style="display:flex; align-items:center;">
                    <span style="font-weight:bold; font-size:0.9em; display:flex; align-items:center; white-space:nowrap;">
                        <span class="jin-icon"></span>위치: <span id="start-val" style="color:var(--danger); margin-left:3px;">미지정</span>
                    </span>
                    <button id="btn-set-start" onclick="toggleMode('set')" style="margin-left: 10px;">시작점 설정</button>
                </div>
                <div style="display:flex; align-items:center; gap:5px;">
                    <button id="btn-edit-reward" class="edit-btn" onclick="toggleMode('reward')">비료 보상 수정</button>
                    <button id="btn-edit-special" class="edit-btn" onclick="toggleMode('special')">특수 발판 수정</button>
                    <button class="calc-btn" onclick="calculate()">계산</button>
                </div>
            </div>
        </div>

        <div id="result">
            <p style="text-align:center; color:#7f8c8d; margin-top:15px; font-size:0.85rem;">
                주사위 눈 입력, ❓ 도달 시 보상 선택 후 <b>🚩 시작점</b>을 설정하고 계산하세요. 
                <br>
                <br>❓에서는 확정 +200 또는 정해진 확률에 따라 성장 비료를 획득 합니다
                <br> 50개 획득: 5%, 100개 획득: 45%, 300개 획득: 45%, 1000개 획득: 5% (평균 기대값 +232.5으로 계산됩니다)
                <b>비료 보상 수정</b>: 좌클릭(+100) / 우클릭(-100)<br>
                <b>특수 발판 수정</b>: 클릭 시 [기본 → 특수주사위 +1 → ⏪-2 → ⏪-3] 순환
            </p>
        </div>
    </div>
</div>

<script>
    const cubeIcon = '<span style="color: purple;">⍰</span>';

    // BOARD 초기 데이터
    const BOARD = Array.from({ length: 41 }, (_, i) => ({
        c: 300, 
        cube: 0, 
        move: 0, 
        display: "+300"
    }));

    // 기본 보드 값 세팅 (사용자 제공 데이터 기반)
    const initialData = {
        1: {c:300}, 2: {c:400}, 3: {c:100}, 4: {c:300}, 5: {c:300}, 6: {c:100}, 7: {c:400}, 8: {c:600}, 9: {c:600}, 10: {move:10, display:"🚀+10"},
        11: {c:300}, 12: {c:100}, 13: {c:400}, 14: {c:100}, 15: {move:-3}, 16: {c:300}, 17: {c:400}, 18: {c:100}, 19: {c:300}, 20: {c:400, cube:1},
        21: {c:300}, 22: {c:300}, 23: {c:300}, 24: {c:400, cube:1}, 25: {c:600}, 26: {move:-2}, 27: {c:400}, 28: {c:600}, 29: {c:300}, 30: {c:0, display:"❓"},
        31: {c:300}, 32: {c:600}, 33: {c:400}, 34: {c:400}, 35: {c:300}, 36: {c:300}, 37: {c:300}, 38: {c:100}, 39: {c:400}, 40: {c:500}
    };

    Object.keys(initialData).forEach(idx => {
        Object.assign(BOARD[idx], initialData[idx]);
    });

    let currentStartPos = 0;
    let activeMode = null; // 'set', 'reward', 'special'
    
    const boardBuffs = new Int8Array(41).fill(0);
    const BUFF_CLASSES = ['no-buff', 'buff-2', 'buff-05', 'buff-3'];
    const TILE_POSITIONS = new Array(41);

    const TOP = 4.0; const BOTTOM = 86.8; const LEFT = 1.2; const RIGHT = 91.0;
    const H_STEP = (RIGHT - LEFT) / 10; const V_STEP = (BOTTOM - TOP) / 10;

    for (let i = 1; i <= 10; i++) TILE_POSITIONS[i] = { t: BOTTOM, l: RIGHT - (i * H_STEP) };
    for (let i = 1; i <= 10; i++) TILE_POSITIONS[10 + i] = { t: BOTTOM - (i * V_STEP), l: LEFT };
    for (let i = 1; i <= 10; i++) TILE_POSITIONS[20 + i] = { t: TOP, l: LEFT + (i * H_STEP) };
    for (let i = 1; i <= 10; i++) TILE_POSITIONS[30 + i] = { t: TOP + (i * V_STEP), l: RIGHT };

    function init() {
        const container = document.getElementById('tile-overlays');
        container.innerHTML = ''; 
        for (let i = 1; i <= 40; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile no-buff';
            tile.id = `tile-${i}`;
            tile.style.top = `${TILE_POSITIONS[i].t}%`;
            tile.style.left = `${TILE_POSITIONS[i].l}%`;
            tile.onmousedown = (e) => handleTileClick(i, e);

            const idLabel = document.createElement('span');
            idLabel.className = 'tile-id';
            idLabel.innerText = i;
            tile.appendChild(idLabel);

            const rewardLabel = document.createElement('span');
            rewardLabel.className = 'tile-reward';
            rewardLabel.id = `reward-text-${i}`;
            tile.appendChild(rewardLabel);
            
            updateTileDisplay(i);
            container.appendChild(tile);
        }
    }

    function toggleMode(mode) {
        if (activeMode === mode) activeMode = null;
        else activeMode = mode;

        document.getElementById('btn-set-start').classList.toggle('active-mode', activeMode === 'set');
        document.getElementById('btn-edit-reward').classList.toggle('active-mode', activeMode === 'reward');
        document.getElementById('btn-edit-special').classList.toggle('active-mode', activeMode === 'special');
        
        document.getElementById('btn-set-start').innerText = (activeMode === 'set') ? '발판 클릭' : '시작점 설정';
    }

    function updateTileDisplay(i) {
        const tile = BOARD[i];
        const displayElem = document.getElementById(`reward-text-${i}`);
        if (!displayElem) return;

        if (i === 30) { displayElem.innerHTML = "❓"; return; }
        if (tile.move > 0 && i === 10) { displayElem.innerHTML = "🚀+10"; return; }

        if (tile.move < 0) {
            displayElem.innerHTML = `⏪${tile.move}`;
        } else {
            let txt = `+${tile.c}`;
            if (tile.cube > 0) txt += cubeIcon;
            displayElem.innerHTML = txt;
        }
    }

    function handleTileClick(i, e) {
        if (activeMode === 'reward') {
            // 금액 수정 모드 (특수 발판 제외)
            if (BOARD[i].move !== 0 || i === 30) return;
            if (e.button === 0) BOARD[i].c = Math.min(600, BOARD[i].c + 100);
            else if (e.button === 2) BOARD[i].c = Math.max(100, BOARD[i].c - 100);
            updateTileDisplay(i);
        } 
        else if (activeMode === 'special') {
            // 특수 수정 모드 (순환: 기본 -> Cube -> -2 -> -3)
            if (i === 30 || i === 10) return;

            if (BOARD[i].cube === 0 && BOARD[i].move === 0) {
                BOARD[i].cube = 1;
            } else if (BOARD[i].cube === 1) {
                BOARD[i].cube = 0; BOARD[i].move = -2;
            } else if (BOARD[i].move === -2) {
                BOARD[i].move = -3;
            } else {
                BOARD[i].move = 0; BOARD[i].cube = 0;
            }
            updateTileDisplay(i);
        } 
        else if (activeMode === 'set') {
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('is-start'));
            currentStartPos = i;
            document.getElementById(`tile-${i}`).classList.add('is-start');
            document.getElementById('start-val').innerText = i + '번';
            toggleMode('set');
        } 
        else {
            // 버프 설정 모드
            boardBuffs[i] = (boardBuffs[i] + 1) % 4;
            const tile = document.getElementById(`tile-${i}`);
            tile.className = `tile ${BUFF_CLASSES[boardBuffs[i]]} ${i === currentStartPos ? 'is-start' : ''}`;
        }
    }

    function calculate() {
        const d = [parseInt(document.getElementById('d1').value), parseInt(document.getElementById('d2').value), parseInt(document.getElementById('d3').value)];
        if(d.some(isNaN)) return alert("주사위 값을 입력하세요.");
        if(currentStartPos === 0) return alert("현재 위치를 설정해주세요.");
        const qVal = parseFloat(document.getElementById('q-mode').value);

        const perms = [];
        const generatePerms = (arr, m = []) => {
            if (arr.length === 0) perms.push(m);
            else for (let i = 0; i < arr.length; i++) { let curr = arr.slice(); let next = curr.splice(i, 1); generatePerms(curr, m.concat(next)); }
        };
        generatePerms(d);

        let results = perms.map(seq => {
            let pos = currentStartPos, totalCoin = 0, totalCube = 0, history = [];
            seq.forEach(dice => {
                pos += dice; 
                while(pos > 40) pos -= 40; while(pos < 1) pos += 40;
                let tile = BOARD[pos];
                
                // 이동 효과 처리
                if(tile.move !== 0) { 
                    pos += tile.move; 
                    while(pos > 40) pos -= 40; while(pos < 1) pos += 40;
                    tile = BOARD[pos]; 
                }
                
                let gain = (pos === 30) ? qVal : (tile.c || 0);
                // 이동 발판 자체는 코인이 0으로 계산됨
                if (BOARD[pos].move !== 0 && pos !== 10) gain = 0;

                if(boardBuffs[pos] === 1) gain *= 2; 
                else if(boardBuffs[pos] === 2) gain = Math.floor(gain * 0.5); 
                else if(boardBuffs[pos] === 3) gain *= 3;
                
                totalCoin += gain; 
                totalCube += (tile.cube || 0);
                history.push({ land: pos, gain });
            });
            return { seq, totalCoin, totalCube, history };
        }).sort((a, b) => b.totalCoin - a.totalCoin || b.totalCube - a.totalCube);

        const resDiv = document.getElementById('result');
        document.querySelectorAll('.tile').forEach(t => t.classList.remove('highlight-tile'));
        let html = `<h4>최적 순서: ${results[0].seq.join(' → ')}</h4>`;
        results.slice(0, 3).forEach((r, idx) => {
            if(idx === 0) r.history.forEach(h => document.getElementById(`tile-${h.land}`).classList.add('highlight-tile'));
            html += `<div class="${idx === 0 ? 'best-card' : 'route-item'}">
                <strong>[${idx+1}순위] ${r.seq.join(' → ')}</strong> | 💰${r.totalCoin.toLocaleString()} | 🟣${r.totalCube}개<br>
                <small>${r.history.map(h => `${h.land}번(+${h.gain})`).join(' → ')}</small>
            </div>`;
        });
        resDiv.innerHTML = html;
    }

    window.onload = init;
</script>
</body>
</html>
