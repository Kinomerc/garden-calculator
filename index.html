<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진의 신비한 정원 계산기</title>
    <style>
      :root {
        --primary: #3498db;
        --success: #2ecc71;
        --warning: #f1c40f;
        --danger: #e74c3c;
        --accent: #9b59b6;
      }

      body {
        font-family: 'Pretendard', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #f0f2f5;
        margin: 0;
        padding: 20px;
      }

      .board-container {
        position: relative;
        width: 1001px;
        height: 726px;
        background-size: 100% 100%;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }

      .tile {
        position: absolute;
        width: 7.5%;
        height: 7.5%;
        cursor: pointer;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        box-sizing: border-box;
        transition: 0.2s;
        background-color: rgba(255, 255, 255, 0.05);
      }

      .tile:hover {
        background-color: rgba(255, 0, 0, 0.2);
        border: 2px solid white;
        z-index: 20;
        transform: scale(1.03);
      }

      .tile-id {
        position: absolute;
        top: 1px;
        left: 3px;
        font-size: 0.65rem;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.7);
        pointer-events: none;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
      }

      .tile-reward {
        position: absolute;
        bottom: 0;
        right: 2px;
        font-size: 0.65rem;
        font-weight: bold;
        color: rgba(0, 0, 0, 0.8);
        background: rgba(255, 255, 255, 0.6);
        padding: 0px 2px;
        border-radius: 2px;
        pointer-events: none;
      }

      .buff-2 { background-color: rgba(52, 152, 219, 0.5) !important; border: 2.5px solid var(--primary) !important; }
      .buff-05 { background-color: rgba(231, 76, 60, 0.5) !important; border: 2.5px solid var(--danger) !important; }
      .buff-3 { background-color: rgba(46, 204, 113, 0.5) !important; border: 2.5px solid var(--success) !important; }

      .tile::after {
        position: absolute;
        top: 48%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 1rem;
        font-weight: 900;
        color: white;
        text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.9);
        opacity: 0;
        pointer-events: none;
      }

      .buff-2::after { content: '×2'; opacity: 1; }
      .buff-05::after { content: '÷2'; opacity: 1; }
      .buff-3::after { content: '×3'; opacity: 1; }

      .jin-icon {
        display: inline-block;
        width: 24px;
        height: 38px;
        background-image: url('https://mblogthumb-phinf.pstatic.net/MjAyNjAzMTVfMTIw/MDAxNzczNTQ4Nzg4OTE4.m2TlurnJGhA6b4xQ8AaBcWRqnjtoiW8T_V56VrlbPE4g.nuCktDPzcTeBKrEIVB0wl3iCT7QyW7_VvijWBQ_lvz8g.GIF/0431.img.stand.gif?type=w966');
        background-size: cover;
        background-position: center;
        vertical-align: middle;
        margin-right: 5px;
      }

      .is-start {
        background-color: transparent !important;
        background-image: url('https://mblogthumb-phinf.pstatic.net/MjAyNjAzMTVfMTIw/MDAxNzczNTQ4Nzg4OTE4.m2TlurnJGhA6b4xQ8AaBcWRqnjtoiW8T_V56VrlbPE4g.nuCktDPzcTeBKrEIVB0wl3iCT7QyW7_VvijWBQ_lvz8g.GIF/0431.img.stand.gif?type=w966');
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        z-index: 100;
      }

      .is-start::before {
        content: '🚩';
        position: absolute;
        top: 20px;
        left: 80%;
        transform: translateX(-50%);
        font-size: 1.3rem;
        color: #e74c3c;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        pointer-events: none;
      }

      .center-control {
        position: absolute;
        top: 18%;
        left: 15%;
        width: 70%;
        height: 62%;
        background-color: rgba(255, 255, 255, 0.98);
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        padding: 15px;
        box-sizing: border-box;
        z-index: 10;
        border: 1px solid #ddd;
      }

      .top-row {
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: #f8f9fa;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #e9ecef;
        margin-bottom: 10px;
      }

      .sub-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
      }

      .dice-area input {
        width: 45px;
        padding: 8px;
        border: 1px solid #ced4da;
        border-radius: 5px;
        text-align: center;
        font-weight: bold;
        font-size: 1.1em;
      }

      #btn-set-start {
        background: #ff9f43;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
      }

      #btn-edit-reward {
        background: #9b59b6;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
      }

      #btn-set-start.active, #btn-edit-reward.active {
        background: #e74c3c;
        animation: blinking 1s infinite;
      }

      @keyframes blinking {
        0% { opacity: 1; }
        50% { opacity: 0.7; }
        100% { opacity: 1; }
      }

      .calc-btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 8px 25px;
        border-radius: 6px;
        font-weight: bold;
        font-size: 1em;
        cursor: pointer;
      }

      .q-option select {
        padding: 7px;
        border-radius: 5px;
        border: 1px solid #ddd;
        font-size: 0.9em;
      }

      #result { flex: 1; overflow-y: auto; border-top: 1px solid #eee; padding-top: 10px; }
      .best-card { background: #e8f5e9; border: 2px solid var(--success); padding: 12px; border-radius: 8px; margin-bottom: 8px; }
      .route-item { background: #f8f9fa; border: 1px solid #eee; padding: 8px; border-radius: 6px; margin-bottom: 5px; }
      .highlight-tile { border: 2px solid var(--accent) !important; z-index: 25 !important; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="board-container">
    <div id="tile-overlays"></div>

    <div class="center-control">
        <div class="top-row">
            <div class="sub-row">
                <div style="display:flex; align-items:center; gap:10px;">
                    <label style="font-weight:bold;">🎲 주사위</label>
                    <div class="dice-area">
                        <input type="number" id="d1" min="-18" max="18" value="1">
                        <input type="number" id="d2" min="-18" max="18" value="1">
                        <input type="number" id="d3" min="-18" max="18" value="1">
                    </div>
                </div>
                <div class="q-option">
                    <label style="font-weight:bold; font-size:0.9em; margin-right:5px;">❓ 설정:</label>
                    <select id="q-mode">
                        <option value="200">노란도시락(+200)</option>
                        <option value="232.5">빨간도시락(+232.5)</option>
                    </select>
                </div>
            </div>

            <div class="sub-row">
                <div style="display:flex; align-items:center;">
                    <span style="font-weight:bold; font-size:0.9em; display:flex; align-items:center; white-space:nowrap;">
                        <span class="jin-icon"></span>위치: <span id="start-val" style="color:var(--danger); margin-left:3px;">미지정</span>
                    </span>
                </div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <button id="btn-set-start" onclick="toggleSetMode()">시작점 설정</button>
                    <button id="btn-edit-reward" onclick="toggleEditMode()">보상 수정</button>
                    <button class="calc-btn" onclick="calculate()">계산</button>
                </div>
            </div>
        </div>

        <div id="result">
            <p style="text-align:center; color:#7f8c8d; margin-top:15px; font-size:0.85rem;">
                주사위 눈 입력, ❓ 도달 시 보상 선택 후 <b>🚩 시작점</b>을 설정하고 계산하세요. 
                <br>
                <br>❓에서는 확정 +200 또는 정해진 확률에 따라 성장 비료를 획득 합니다
                <br> 50개 획득: 5%, 100개 획득: 45%, 300개 획득: 45%, 1000개 획득: 5% (평균 기대값 +232.5으로 계산됩니다)
            </p>
        </div>
    </div>
</div>

<script>
    const cubeIcon = '<span style="color: purple;">⍰</span>';

    const BOARD = [
        null, 
        { c: 300, display: "+300" }, { c: 400, display: "+400" }, { c: 100, display: "+100" }, { c: 300, display: "+300" }, { c: 300, display: "+300" }, { c: 100, display: "+100" }, { c: 400, display: "+400" }, { c: 600, display: "+600" }, { c: 600, display: "+600" }, { move: 10, display: "🚀+10" },
        { c: 300, display: "+300" }, { c: 100, display: "+100" }, { c: 400, display: "+400" }, { c: 100, display: "+100" }, { move: -3, display: "⏪-3" }, { c: 300, display: "+300" }, { c: 400, display: "+400" }, { c: 100, display: "+100" }, { c: 300, display: "+300" }, { c: 400, display: "+400" },
        { c: 300, display: "+300" }, { c: 300, display: "+300" }, { c: 300, display: "+300" }, { c: 300, display: "+400" }, { c: 600, display: "+600" }, { move: -2, display: "⏪-2" }, { c: 400, display: "+400" }, { c: 600, display: "+600" }, { c: 300, display: "+300" }, { c: 0, display: "❓" },
        { c: 300, display: "+300" }, { c: 600, display: "+600" }, { c: 400, display: "+400" }, { c: 400, display: "+400" }, { c: 300, display: "+300" }, { c: 300, display: "+300" }, { c: 300, display: "+300" }, { i: 100, display: "+100" }, { c: 400, display: "+400" }, { c: 500, display: "+500" }
    ];

    let currentStartPos = 0;
    let isSettingMode = false;
    let isEditMode = false;
    const boardBuffs = new Int8Array(41).fill(0);
    const BUFF_CLASSES = ['no-buff', 'buff-2', 'buff-05', 'buff-3'];
    const TILE_POSITIONS = new Array(41);

    const TOP = 4.0; const BOTTOM = 86.8; const LEFT = 1.2; const RIGHT = 91.0;
    const H_STEP = (RIGHT - LEFT) / 10; const V_STEP = (BOTTOM - TOP) / 10;

    for (let i = 1; i <= 10; i++) TILE_POSITIONS[i] = { t: BOTTOM, l: RIGHT - (i * H_STEP) };
    for (let i = 1; i <= 10; i++) TILE_POSITIONS[10 + i] = { t: BOTTOM - (i * V_STEP), l: LEFT };
    for (let i = 1; i <= 10; i++) TILE_POSITIONS[20 + i] = { t: TOP, l: LEFT + (i * H_STEP) };
    for (let i = 1; i <= 10; i++) TILE_POSITIONS[30 + i] = { t: TOP + (i * V_STEP), l: RIGHT };

    function init() {
        const container = document.getElementById('tile-overlays');
        container.innerHTML = ''; 
        for (let i = 1; i <= 40; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile no-buff';
            tile.id = `tile-${i}`;
            tile.style.top = `${TILE_POSITIONS[i].t}%`;
            tile.style.left = `${TILE_POSITIONS[i].l}%`;
            tile.onmousedown = (e) => handleTileClick(i, e);

            const idLabel = document.createElement('span');
            idLabel.className = 'tile-id';
            idLabel.innerText = i;
            tile.appendChild(idLabel);

            const rewardLabel = document.createElement('span');
            rewardLabel.className = 'tile-reward';
            rewardLabel.id = `reward-text-${i}`;
            rewardLabel.innerHTML = BOARD[i] ? BOARD[i].display : "";
            tile.appendChild(rewardLabel);
            container.appendChild(tile);
        }
    }

    function toggleEditMode() {
        if (isSettingMode) toggleSetMode();
        isEditMode = !isEditMode;
        const btn = document.getElementById('btn-edit-reward');
        btn.classList.toggle('active', isEditMode);
        btn.innerText = isEditMode ? '수정 중...' : '보상 수정';
    }

    function toggleSetMode() {
        if (isEditMode) toggleEditMode();
        isSettingMode = !isSettingMode;
        const btn = document.getElementById('btn-set-start');
        btn.classList.toggle('active', isSettingMode);
        btn.innerText = isSettingMode ? '발판 클릭' : '시작점 설정';
    }

    function handleTileClick(i, e) {
        if (isEditMode) {
            if (BOARD[i].move || i === 30) return;
            if (e.button === 0) BOARD[i].c = Math.min(600, BOARD[i].c + 100);
            else if (e.button === 2) BOARD[i].c = Math.max(100, BOARD[i].c - 100);
            BOARD[i].display = `+${BOARD[i].c}${BOARD[i].cube ? cubeIcon : ''}`;
            document.getElementById(`reward-text-${i}`).innerHTML = BOARD[i].display;
        } else if (isSettingMode) {
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('is-start'));
            currentStartPos = i;
            document.getElementById(`tile-${i}`).classList.add('is-start');
            document.getElementById('start-val').innerText = i + '번';
            toggleSetMode();
        } else {
            boardBuffs[i] = (boardBuffs[i] + 1) % 4;
            const tile = document.getElementById(`tile-${i}`);
            tile.className = `tile ${BUFF_CLASSES[boardBuffs[i]]} ${i === currentStartPos ? 'is-start' : ''}`;
        }
    }

    function calculate() {
        const d = [parseInt(document.getElementById('d1').value), parseInt(document.getElementById('d2').value), parseInt(document.getElementById('d3').value)];
        if(d.some(isNaN)) return alert("주사위 값을 입력하세요.");
        if(currentStartPos === 0) return alert("현재 위치를 설정해주세요.");
        const qVal = parseFloat(document.getElementById('q-mode').value);

        const perms = [];
        const generatePerms = (arr, m = []) => {
            if (arr.length === 0) perms.push(m);
            else for (let i = 0; i < arr.length; i++) { let curr = arr.slice(); let next = curr.splice(i, 1); generatePerms(curr, m.concat(next)); }
        };
        generatePerms(d);

        let results = perms.map(seq => {
            let pos = currentStartPos, totalCoin = 0, totalCube = 0, history = [];
            seq.forEach(dice => {
                pos += dice; 
                while(pos > 40) pos -= 40; while(pos < 1) pos += 40;
                let tile = BOARD[pos];
                if(tile.move) { pos += tile.move; while(pos > 40) pos -= 40; while(pos < 1) pos += 40; tile = BOARD[pos]; }
                let gain = (pos === 30) ? qVal : (tile.c || 0);
                if(boardBuffs[pos] === 1) gain *= 2; 
                else if(boardBuffs[pos] === 2) gain = Math.floor(gain * 0.5); 
                else if(boardBuffs[pos] === 3) gain *= 3;
                totalCoin += gain; 
                totalCube += (tile.cube || 0);
                history.push({ land: pos, gain });
            });
            return { seq, totalCoin, totalCube, history };
        }).sort((a, b) => b.totalCoin - a.totalCoin || b.totalCube - a.totalCube);

        const resDiv = document.getElementById('result');
        document.querySelectorAll('.tile').forEach(t => t.classList.remove('highlight-tile'));
        let html = `<h4>추천 경로: ${results[0].seq.join(' → ')}</h4>`;
        results.slice(0, 3).forEach((r, idx) => {
            if(idx === 0) r.history.forEach(h => document.getElementById(`tile-${h.land}`).classList.add('highlight-tile'));
            html += `<div class="${idx === 0 ? 'best-card' : 'route-item'}">
                <strong>[${idx+1}순위] ${r.seq.join(' → ')}</strong> | 💰${r.totalCoin.toLocaleString()} | 🟣${r.totalCube}개<br>
                <small>${r.history.map(h => `${h.land}번(+${h.gain})`).join(' → ')}</small>
            </div>`;
        });
        resDiv.innerHTML = html;
    }

    window.onload = init;
</script>
</body>
</html>
